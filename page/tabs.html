<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="../asset/css/style.css" />
    </head>
    <body>
        <div class="wrapper">
            <div class="tabs js-tabs" id="tab1">
                <div class="tabs-header">
                    <div class="tab-button active" data-target="tab-1">Tab 1</div>
                    <div class="tab-button" data-target="tab-2">Tab 2</div>
                    <div class="tab-button" data-target="tab-3">Tab 3</div>
                </div>
                <div class="tabs-content">
                    <div id="tab-1" class="tab-content__panel active">Tab 1</div>
                    <div id="tab-2" class="tab-content__panel">Tab 2</div>
                    <div id="tab-3" class="tab-content__panel">Tab 3</div>
                </div>
            </div>
        </div>
        <div class="wrapper">
        <div class="tabs js-tabs" id="tab2">
                <div class="tabs-header">
                    <div class="tab-button active" data-target="tab-1">Tab 1</div>
                    <div class="tab-button" data-target="tab-2">Tab 2</div>
                    <div class="tab-button" data-target="tab-3">Tab 3</div>
                </div>
                <div class="tabs-content">
                    <div id="tab-1" class="tab-content__panel active">Tab 1</div>
                    <div id="tab-2" class="tab-content__panel">Tab 2</div>
                    <div id="tab-3" class="tab-content__panel">Tab 3</div>
                </div>
            </div>
        </div>
        <script src="../asset/js/tabs.js"></script>
        <script>
            const tabs = document.querySelectorAll(".js-tabs");
            tabs.forEach((tab) => {
                tab.addEventListener("tab-change", (event) => {
                    console.log(event);

                    console.log("Tab cũ:", event.detail.old);
                    console.log("Tab mới:", event.detail.current);
                });
            });
        </script>
    </body>
</html>
